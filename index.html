<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>piano-midi</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #tools {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    #tools input[type="file"] {
      color: #fff;
    }

    #tools button {
      padding: 4px 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    #tools button:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    #score-container {
      height: 300px;
      width: 100%;
      overflow-x: hidden;
      display: none;
      position: fixed;
      top: 10;
      left: 0;
      background-color: white;
    }



    /* 小节光标 - 播放到哪个小节时高亮 */
    .at-cursor-bar {
      background: rgba(255, 200, 0, 0.3);
    }

    /* 节拍光标 - 跟随播放进度移动的指示条 */
    .at-cursor-beat {
      background: rgba(0, 120, 255, 0.8);
      width: 3px;
      /* 必须设置宽度，否则看不见 */
    }

    /* 选中区域（如果启用了鼠标选择功能） */
    .at-selection div {
      background: rgba(64, 64, 255, 0.15);
    }
  </style>
</head>

<body>
  <div id="tools">
    <input type="file" id="midi" accept=".mid">
    <button id="playmidi">播放</button>
      <!-- <button id="scoreplay">score播放</button> -->
  </div>
  <div id="score-container">
    <div id="score-element"></div>
  </div>
  <script type="module" src="/src/midi-visual.js"></script>
  <!-- <script src="src/score-show.js" type="module"></script> -->
  <script src="src/particle.js" type="module"></script>
</body>

</html>
