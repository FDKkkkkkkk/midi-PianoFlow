  <!-- 结构化数据 -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "MIDI PianoFlow",
    "url": "https://github.com/FDKkkkkkkk/midi-PianoFlow",
    "description": "在线钢琴 MIDI 可视化播放器，支持瀑布流、粒子特效与实时键盘高亮。",
    "applicationCategory": "MultimediaApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "CNY" }
  }
  </script>
</head>

<body>
  <div id="load-example-container">
    <select id="example-select" title="加载示例曲目">
      <option value="" disabled selected>示例</option>
      <option value="flower-dance.mid">花之舞</option>
      <option value="confession-night.mid">告白之夜</option>
      <option value="replicated-memories.mid">复刻回忆</option>
      <option value="time-boils-rain.mid">时间煮雨</option>
      <option value="lu-xiaoyu.mid">路小雨</option>
      <option value="purrvoice-dajiangfu.mid">Purrvoice - 大丈夫</option>
      <option value="sparkle-movie.mid">Sparkle (Movie ver.)</option>
      <option value="steinway-rhythm-doctor.mid">Steinway - 节奏医生</option>
    </select>
  </div>
  <div id="tools">
    <div id="upload-group">
      <input type="file" id="midi" accept=".mid">
      <label for="midi" title="上传文件">
        <img src="/src/assets/icons/upload.svg" alt="上传" width="20" height="20" />
      </label>
    </div>
    <span id="filename"></span>
    <button id="playmidi" title="播放">
      <img class="icon-play" src="/src/assets/icons/play.svg" alt="播放" width="20" height="20" />
      <img class="icon-pause" src="/src/assets/icons/pause.svg" alt="暂停" width="20" height="20" style="display:none" />
    </button>
    <div id="progress-container">
      <span id="time-current">0:00</span>
      <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1" disabled />
      <span id="time-total">0:00</span>
    </div>
    <div id="volume-container">
      <button id="volume-btn" title="静音">
        <img class="icon-sound" src="/src/assets/icons/sound.svg" alt="音量" width="20" height="20" />
        <img class="icon-mute" src="/src/assets/icons/mute.svg" alt="静音" width="20" height="20" style="display:none" />
      </button>
      <input type="range" id="volume-slider" min="0" max="100" value="80" step="1" />
    </div>
    <button id="fullscreen" title="全屏">
      <img src="/src/assets/icons/fullscreen.svg" alt="全屏" width="20" height="20" />
    </button>
      <!-- <button id="scoreplay">score播放</button> -->
  </div>
  <div id="settings-container">
    <button id="settings-btn" title="设置">
      <img src="/src/assets/icons/setting.svg" alt="设置" width="20" height="20" />
    </button>
    <a id="github-link" href="https://github.com/FDKkkkkkkk/midi-PianoFlow" target="_blank" rel="noopener noreferrer" title="GitHub">
      <img src="/src/assets/icons/github.svg" alt="GitHub" width="20" height="20" />
    </a>
  </div>
  <dialog id="settings-dialog">
    <div class="dialog-content">
      <h3>设置</h3>
      <label class="toggle-row">
        <span>显示瀑布流</span>
        <div class="toggle-switch">
          <input type="checkbox" id="waterfall-toggle" checked />
          <span class="toggle-slider"></span>
        </div>
      </label>
      <label class="color-row">
        <span>背景颜色</span>
        <input type="color" id="bg-color" value="#000000" />
      </label>
      <label class="color-row">
        <span>键盘高亮颜色</span>
        <input type="color" id="highlight-color" value="#9400D3" />
      </label>
      <label class="color-row">
        <span>瀑布流颜色</span>
        <input type="color" id="waterfall-color" value="#aa66ff" />
      </label>
      <label class="color-row">
        <span>粒子颜色</span>
        <input type="color" id="particle-color" value="#aa66ff" />
      </label>
      <label class="toggle-row">
        <span>显示粒子</span>
        <div class="toggle-switch">
          <input type="checkbox" id="particle-toggle" checked />
          <span class="toggle-slider"></span>
        </div>
      </label>
      <label class="toggle-row">
        <span>显示帧率</span>
        <div class="toggle-switch">
          <input type="checkbox" id="fps-toggle" />
          <span class="toggle-slider"></span>
        </div>
      </label>
      <label class="toggle-row">
        <span>混响</span>
        <div class="toggle-switch">
          <input type="checkbox" id="reverb-toggle" />
          <span class="toggle-slider"></span>
        </div>
      </label>
      <label class="slider-row">
        <span>混响强度</span>
        <div class="slider-container">
          <input type="range" id="reverb-slider" min="0" max="100" value="30" step="1" />
          <span id="reverb-value">30%</span>
        </div>
      </label>
      <div class="dialog-buttons">
        <button id="settings-reset" class="dialog-reset-btn">重置默认</button>
        <button id="settings-close" class="dialog-close-btn">关闭</button>
      </div>
    </div>
  </dialog>
  <div id="score-container">
    <div id="score-element"></div>
  </div>
  <script src="/src/midi-visual.js" type="module" ></script>
  <!-- <script src="src/score-show.js" type="module"></script> -->
  <script src="/src/particle.js" type="module"></script>
</body>

</html>
