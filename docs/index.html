  <title>piano-midi</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #tools {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    /* 顶部悬停热区 + 工具栏自身悬停时显示 */
    #tools::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 48px;
      z-index: -1;
      pointer-events: auto;
    }

    #tools:hover {
      opacity: 1;
      pointer-events: auto;
    }

    #tools input[type="file"] {
      display: none;
    }

    #tools label[for="midi"] {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      cursor: pointer;
      user-select: none;
    }

    #tools label[for="midi"] img {
      display: block;
      filter: brightness(0) invert(1);
    }

    #tools label[for="midi"]:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    #tools #filename {
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #tools button {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      cursor: pointer;
    }

    #tools button img {
      display: block;
      filter: brightness(0) invert(1);
    }

    #tools button:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    #progress-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 4px;
    }

    #time-current, #time-total {
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      min-width: 40px;
      text-align: center;
      white-space: nowrap;
    }

    #progress-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      cursor: pointer;
    }

    #progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 0 4px rgba(0,0,0,0.3);
    }

    #progress-bar::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
    }

    #score-container {
      height: 300px;
      width: 100%;
      overflow-x: hidden;
      display: none;
      position: fixed;
      top: 10;
      left: 0;
      background-color: white;
    }



    /* 小节光标 - 播放到哪个小节时高亮 */
    .at-cursor-bar {
      background: rgba(255, 200, 0, 0.3);
    }

    /* 节拍光标 - 跟随播放进度移动的指示条 */
    .at-cursor-beat {
      background: rgba(0, 120, 255, 0.8);
      width: 3px;
      /* 必须设置宽度，否则看不见 */
    }

    /* 选中区域（如果启用了鼠标选择功能） */
    .at-selection div {
      background: rgba(64, 64, 255, 0.15);
    }
  </style>
